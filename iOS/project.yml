name: BatchTan
options:
  bundleIdPrefix: com.shimondeitel.taxidermyprep
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  BatchTan:
    type: application
    platform: iOS
    sources:
      - path: BatchTan
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.taxidermyprep
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: BatchTan/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BatchTanTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BatchTanTests
      - path: BatchTan.storekit
    dependencies:
      - target: BatchTan
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.taxidermyprep.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BatchTanUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BatchTanUITests
    dependencies:
      - target: BatchTan
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.taxidermyprep.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  BatchTan:
    build:
      targets:
        BatchTan: all
        BatchTanTests: [test]
        BatchTanUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: BatchTan.storekit
    test:
      config: Debug
      storeKitConfiguration: BatchTan.storekit
      targets:
        - BatchTanTests
        - BatchTanUITests
    archive:
      config: Release
